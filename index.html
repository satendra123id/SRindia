<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRindia - Premium Learning Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f8f9fa; color: #333; }
        
        /* Navbar */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .logo { font-size: 28px; font-weight: bold; color: #6610f2; letter-spacing: 1px; }
        .nav-links button { background: #6610f2; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .nav-links button:hover { background: #520dc2; }

        /* Hero Section */
        .hero { text-align: center; padding: 100px 20px; background: linear-gradient(135deg, #6610f2, #0d6efd); color: white; }
        .hero h1 { font-size: 50px; margin-bottom: 20px; }
        .hero p { font-size: 20px; margin-bottom: 30px; max-width: 600px; margin-left: auto; margin-right: auto; }

        /* Login Modal (Hidden by default) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; }
        .login-box { background: #fff; padding: 40px; border-radius: 10px; width: 400px; text-align: center; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #888; }
        .login-box h2 { margin-bottom: 20px; color: #333; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        .login-box button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; margin-top: 10px; }
        .login-box button:hover { background: #218838; }

        /* Admin Dashboard Demo (Hidden by default) */
        .admin-dashboard { display: none; padding: 50px; text-align: center; }
        .admin-dashboard h2 { color: #28a745; margin-bottom: 20px; }
        .admin-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">SRindia</div>
        <div class="nav-links">
            <button onclick="openLogin()">Admin Login</button>
        </div>
    </nav>

    <div id="mainContent">
        <header class="hero">
            <h1>Welcome to SRindia</h1>
            <p>India's Premium Platform for E-Learning, Skill Development, and High-Quality Content.</p>
        </header>
    </div>

    <div id="adminPanel" class="admin-dashboard">
        <h2>Welcome Admin (Sitaram)</h2>
        <div class="admin-card">
            <h3>Website Control Panel</h3>
            <p>Yeh ek demo admin area hai. Real working ke liye isko database se connect karna hoga.</p>
            <br>
            <button onclick="logout()" style="padding: 10px 20px; background: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer;">Logout</button>
        </div>
    </div>

    <div id="loginModal" class="modal-overlay">
        <div class="login-box">
            <span class="close-btn" onclick="closeLogin()">&times;</span>
            <h2>Admin Login</h2>
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button onclick="checkLogin()">Login to Dashboard</button>
        </div>
    </div>

    <script>
        // Modal Control
        function openLogin() { document.getElementById('loginModal').style.display = 'flex'; }
        function closeLogin() { document.getElementById('loginModal').style.display = 'none'; }

        // DEMO Login Logic (NEVER use this method in a real published website)
        function checkLogin() {
            let email = document.getElementById('email').value;
            let pass = document.getElementById('password').value;

            if (email === "satendrlodhi711@gmail.com" && pass === "Seetaram12") {
                alert("Login Successful! Welcome to SRindia Admin Panel.");
                closeLogin();
                document.getElementById('mainContent').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
            } else {
                alert("Wrong Email or Password!");
            }
        }

        // Logout Logic
        function logout() {
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        }
    </script>

</body>
</html>
