<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRindia - Premium Education</title>
    <style>
        :root { --main: #6366f1; --text: #1e293b; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: #f1f5f9; color: var(--text); line-height: 1.6; }
        
        nav { display:flex; justify-content:space-between; align-items:center; padding:15px 5%; background:white; position:sticky; top:0; z-index:100; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .logo-area { display:flex; align-items:center; gap:10px; }
        .logo-img { height: 40px; border-radius: 5px; }
        .site-name { font-size: 22px; font-weight: 800; color: var(--main); }

        .hero { text-align:center; padding: 60px 20px; background: linear-gradient(135deg, #4f46e5, #6366f1); color:white; }
        
        .container { padding: 40px 5%; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        
        .card { background:white; border-radius:15px; overflow:hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: 0.3s; border: 1px solid #e2e8f0; }
        .card:hover { transform: translateY(-5px); }
        .card-img { width:100%; height:200px; object-fit:cover; }
        .card-body { padding:20px; }
        .price { font-size: 24px; font-weight: 800; color: #10b981; }
        .old-price { font-size: 16px; color: #94a3b8; text-decoration: line-through; margin-left: 10px; }
        
        .buy-btn { display:block; background:#25D366; color:white; text-align:center; padding:15px; text-decoration:none; font-weight:bold; border-radius:10px; margin-top:15px; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <nav>
        <div class="logo-area">
            <img id="navLogo" src="" class="logo-img" style="display:none;">
            <span id="navName" class="site-name">SRindia</span>
        </div>
    </nav>

    <header class="hero">
        <h1 id="heroTitle">Learn Skills, Build Future</h1>
        <p>Premium Courses by Sitaram Lodhi</p>
    </header>

    <div class="container">
        <div id="courseGrid" class="grid">Loading...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBs4mFioKL9uztdSU90-iFXvvBU-8K15Mg",
            authDomain: "srindia-1f973.firebaseapp.com",
            databaseURL: "https://srindia-1f973-default-rtdb.firebaseio.com",
            projectId: "srindia-1f973"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Branding Load
        db.ref('settings').on('value', s => {
            if(s.exists()){
                const data = s.val();
                if(data.logo) {
                    document.getElementById('navLogo').src = data.logo;
                    document.getElementById('navLogo').style.display = 'block';
                }
                document.getElementById('navName').innerText = data.name || "SRindia";
                document.title = data.name || "SRindia";
            }
        });

        // 2. Courses Load (Price Management Enabled)
        db.ref('courses').on('value', s => {
            const grid = document.getElementById('courseGrid');
            grid.innerHTML = '';
            s.forEach(child => {
                const c = child.val();
                grid.innerHTML += `
                    <div class="card">
                        <img src="${c.img || 'https://via.placeholder.com/400x200'}" class="card-img">
                        <div class="card-body">
                            <h3>${c.title}</h3>
                            <p style="color:#64748b; font-size:14px; margin:10px 0;">${c.desc}</p>
                            <div class="price">₹${c.price} <span class="old-price">₹${c.oldPrice}</span></div>
                            <a href="https://wa.me/919399687115?text=Hello Sitaram, I want to buy ${encodeURIComponent(c.title)}" class="buy-btn">Buy on WhatsApp</a>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
